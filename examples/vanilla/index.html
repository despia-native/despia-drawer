<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>@despia/drawer vanilla demo</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f4f5;
        color: #111827;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        padding: 32px;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2.5rem, 8vw, 5.5rem);
        line-height: 0.95;
      }

      p {
        max-width: 620px;
        color: #4b5563;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #111827;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 18px;
      }

      .actions,
      .cards,
      .drawer-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .cards {
        margin-top: 48px;
      }

      .cards button {
        min-width: 140px;
        min-height: 96px;
        border-radius: 28px;
        background: white;
        color: #111827;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      smooth-drawer {
        --drawer-radius: 56px;
      }
    </style>
  </head>
  <body>
    <h1>Native scroll-snap bottom sheet</h1>
    <p>
      Drag slowly, hard-flick upward, switch snap modes, toggle theme, and tap
      the cards behind the sheet while it is only partially open.
    </p>
    <p><strong>Previewing @despia/drawer v0.0.6</strong></p>

    <div class="actions">
      <button data-open="peek">Peek</button>
      <button data-open="medium">Medium</button>
      <button data-open="large">Large</button>
      <button data-close>Close</button>
      <button data-theme>Toggle Theme</button>
      <button data-mode>Toggle Snap Mode</button>
    </div>

    <div class="cards">
      <button onclick="alert('Background click reached Maps')">Maps</button>
      <button onclick="alert('Background click reached Messages')">Messages</button>
      <button onclick="alert('Background click reached Music')">Music</button>
      <button onclick="alert('Background click reached Wallet')">Wallet</button>
    </div>

    <smooth-drawer
      id="drawer"
      detents="closed:0, peek:22vh, medium:55vh, large:92vh"
      detent="peek"
      backdrop="from:large"
      snap-mode="momentum"
      theme="auto"
      smart-keyboard
    >
      <h2>Hello drawer</h2>
      <p id="state">Waiting for state...</p>
      <label>
        Try smart keyboard:
        <input placeholder="Focus me on iOS" />
      </label>
      <div class="drawer-actions">
        <button data-next>Next</button>
        <button data-prev>Previous</button>
      </div>
    </smooth-drawer>

    <script type="module">
      import '../../dist/index.js';

      const drawer = document.getElementById('drawer');
      const state = document.getElementById('state');

      document.querySelectorAll('[data-open]').forEach((button) => {
        button.addEventListener('click', () => drawer.show(button.dataset.open));
      });
      document.querySelector('[data-close]').addEventListener('click', () => drawer.hide());
      document.querySelector('[data-next]').addEventListener('click', () => drawer.next());
      document.querySelector('[data-prev]').addEventListener('click', () => drawer.previous());

      document.querySelector('[data-theme]').addEventListener('click', () => {
        drawer.setAttribute('theme', drawer.getAttribute('theme') === 'dark' ? 'light' : 'dark');
      });

      document.querySelector('[data-mode]').addEventListener('click', () => {
        const next = drawer.getAttribute('snap-mode') === 'strict' ? 'momentum' : 'strict';
        drawer.setAttribute('snap-mode', next);
      });

      drawer.addEventListener('detent-change', (event) => {
        state.textContent = `Settled at ${event.detail.detent}, trigger ${event.detail.trigger}`;
      });
    </script>
  </body>
</html>
